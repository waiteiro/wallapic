<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ontole Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 2rem;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 2rem;
            color: #6366f1;
        }
        
        .section {
            background: #16213e;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #2a2a4e;
        }
        
        .section h2 {
            color: #8b5cf6;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            background: #0f1729;
            border: 2px solid #2a2a4e;
            border-radius: 8px;
            color: #eee;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .result {
            background: #0f1729;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            border-left: 4px solid #6366f1;
        }
        
        .result.success {
            border-left-color: #10b981;
        }
        
        .result.error {
            border-left-color: #ef4444;
        }
        
        .loading {
            color: #8b5cf6;
            font-style: italic;
        }
        
        code {
            background: #0f1729;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #10b981;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .stat {
            background: #0f1729;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .palabras-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .palabra-tag {
            background: #2a2a4e;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #8b5cf6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test Ontole Engine</h1>
        
        <!-- Generar Ecuación -->
        <div class="section">
            <h2>1. Generar Ecuación Dinámica</h2>
            <button onclick="generarEcuacion()">🎲 Generar Nueva Ecuación</button>
            <button onclick="generarMultiples()">🎲 Generar 5 Ecuaciones</button>
            <div id="ecuacionResult"></div>
        </div>
        
        <!-- Validar Respuesta -->
        <div class="section">
            <h2>2. Validar Respuesta</h2>
            <p>Primero genera una ecuación arriba, luego escribe tu respuesta aquí:</p>
            <input type="text" id="respuestaInput" placeholder="Escribe tu respuesta...">
            <button onclick="validarRespuesta()">✅ Validar</button>
            <div id="validacionResult"></div>
        </div>
        
        <!-- Estadísticas -->
        <div class="section">
            <h2>3. Estadísticas del Motor</h2>
            <button onclick="mostrarEstadisticas()">📊 Ver Estadísticas</button>
            <div id="statsResult"></div>
        </div>
        
        <!-- Test ConceptNet -->
        <div class="section">
            <h2>4. Test ConceptNet API</h2>
            <input type="text" id="palabraTest" placeholder="Escribe una palabra..." value="madre">
            <button onclick="testSinonimos()">🔍 Ver Sinónimos</button>
            <button onclick="testAntonimos()">🔄 Ver Antónimos</button>
            <button onclick="testRelacionados()">🔗 Ver Relacionados</button>
            <div id="conceptNetResult"></div>
        </div>
    </div>
    
    <script src="ontole-engine.js"></script>
    <script>
        let engine = null;
        let ecuacionActual = null;
        
        // Inicializar motor
        window.addEventListener('DOMContentLoaded', () => {
            engine = new OntoleEngine();
            console.log('✅ Motor Ontole inicializado');
        });
        
        // Generar ecuación
        async function generarEcuacion() {
            const resultDiv = document.getElementById('ecuacionResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Generando ecuación...</div>';
            
            try {
                ecuacionActual = await engine.generarEcuacion(1);
                
                resultDiv.innerHTML = `
                    <div class="result success">
                        <h3 style="color: #10b981; margin-bottom: 0.5rem;">✅ Ecuación Generada</h3>
                        <p><strong>Operación:</strong> <code>${ecuacionActual.operacion}</code></p>
                        <p><strong>Palabra base:</strong> ${ecuacionActual.palabraBase}</p>
                        <p><strong>Tipo:</strong> ${ecuacionActual.operacionTipo}</p>
                        
                        <div style="margin-top: 1rem;">
                            <p><strong>🎯 Respuestas Exactas:</strong></p>
                            <div class="palabras-list">
                                ${ecuacionActual.respuestas.exactas.map(p => `<span class="palabra-tag">${p}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div style="margin-top: 1rem;">
                            <p><strong>✅ Respuestas Coherentes:</strong></p>
                            <div class="palabras-list">
                                ${ecuacionActual.respuestas.coherentes.map(p => `<span class="palabra-tag">${p}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div style="margin-top: 1rem;">
                            <p><strong>✨ Respuestas Poéticas:</strong></p>
                            <div class="palabras-list">
                                ${ecuacionActual.respuestas.poeticas.map(p => `<span class="palabra-tag">${p}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3 style="color: #ef4444;">❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Generar múltiples
        async function generarMultiples() {
            const resultDiv = document.getElementById('ecuacionResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Generando 5 ecuaciones...</div>';
            
            const ecuaciones = [];
            for (let i = 0; i < 5; i++) {
                try {
                    const eq = await engine.generarEcuacion(1);
                    ecuaciones.push(eq);
                } catch (e) {
                    console.error('Error generando ecuación:', e);
                }
            }
            
            resultDiv.innerHTML = `
                <div class="result success">
                    <h3 style="color: #10b981; margin-bottom: 1rem;">✅ ${ecuaciones.length} Ecuaciones Generadas</h3>
                    ${ecuaciones.map((eq, i) => `
                        <div style="margin-bottom: 1rem; padding: 0.75rem; background: #0f1729; border-radius: 6px;">
                            <strong>${i+1}.</strong> <code>${eq.operacion}</code>
                            <div style="font-size: 0.85rem; color: #999; margin-top: 0.25rem;">
                                Respuestas: ${eq.respuestas.exactas.join(', ')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // Validar respuesta
        async function validarRespuesta() {
            if (!ecuacionActual) {
                alert('Primero genera una ecuación');
                return;
            }
            
            const input = document.getElementById('respuestaInput');
            const respuesta = input.value.trim();
            
            if (!respuesta) {
                alert('Escribe una respuesta');
                return;
            }
            
            const resultDiv = document.getElementById('validacionResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Validando...</div>';
            
            try {
                const resultado = await engine.validarRespuesta(ecuacionActual, respuesta);
                
                if (resultado.correcto) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3 style="color: #10b981;">✅ ¡Correcto!</h3>
                            <p><strong>Coherencia:</strong> ${resultado.coherencia}</p>
                            <p><strong>Puntos:</strong> ${resultado.puntos}</p>
                            <p>${resultado.explicacion}</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3 style="color: #ef4444;">❌ Incorrecto</h3>
                            <p>${resultado.mensaje}</p>
                            <p><strong>Alternativas:</strong></p>
                            <div class="palabras-list">
                                ${resultado.alternativas.map(p => `<span class="palabra-tag">${p}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3 style="color: #ef4444;">❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Mostrar estadísticas
        function mostrarEstadisticas() {
            const stats = engine.getEstadisticas();
            const resultDiv = document.getElementById('statsResult');
            
            resultDiv.innerHTML = `
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value">${stats.ecuacionesGeneradas}</div>
                        <div class="stat-label">Ecuaciones</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${stats.cacheSize}</div>
                        <div class="stat-label">Caché</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${stats.historialJugador}</div>
                        <div class="stat-label">Historial</div>
                    </div>
                </div>
            `;
        }
        
        // Test ConceptNet
        async function testSinonimos() {
            const palabra = document.getElementById('palabraTest').value;
            const resultDiv = document.getElementById('conceptNetResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Consultando ConceptNet...</div>';
            
            const sinonimos = await engine.conceptNet.getSinonimos(palabra);
            
            resultDiv.innerHTML = `
                <div class="result">
                    <h3>Sinónimos de "${palabra}":</h3>
                    <div class="palabras-list">
                        ${sinonimos.length > 0 
                            ? sinonimos.map(s => `<span class="palabra-tag">${s}</span>`).join('')
                            : '<span style="color: #999;">No se encontraron sinónimos</span>'
                        }
                    </div>
                </div>
            `;
        }
        
        async function testAntonimos() {
            const palabra = document.getElementById('palabraTest').value;
            const resultDiv = document.getElementById('conceptNetResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Consultando ConceptNet...</div>';
            
            const antonimos = await engine.conceptNet.getAntonimos(palabra);
            
            resultDiv.innerHTML = `
                <div class="result">
                    <h3>Antónimos de "${palabra}":</h3>
                    <div class="palabras-list">
                        ${antonimos.length > 0 
                            ? antonimos.map(s => `<span class="palabra-tag">${s}</span>`).join('')
                            : '<span style="color: #999;">No se encontraron antónimos</span>'
                        }
                    </div>
                </div>
            `;
        }
        
        async function testRelacionados() {
            const palabra = document.getElementById('palabraTest').value;
            const resultDiv = document.getElementById('conceptNetResult');
            resultDiv.innerHTML = '<div class="loading">⏳ Consultando ConceptNet...</div>';
            
            const relacionados = await engine.conceptNet.getPalabrasSimilares(palabra);
            
            resultDiv.innerHTML = `
                <div class="result">
                    <h3>Palabras relacionadas con "${palabra}":</h3>
                    <div class="palabras-list">
                        ${relacionados.length > 0 
                            ? relacionados.slice(0, 15).map(s => `<span class="palabra-tag">${s}</span>`).join('')
                            : '<span style="color: #999;">No se encontraron palabras relacionadas</span>'
                        }
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
